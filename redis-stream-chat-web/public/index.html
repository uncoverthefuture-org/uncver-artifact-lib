<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemma Chat - Redis Stream</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">🤖</span>
          <h1>Gemma Chat</h1>
        </div>
        <span class="subtitle">Redis Stream AI Interface</span>
      </div>
      <div class="header-right">
        <div class="status" id="connectionStatus">
          <span class="status-dot offline"></span>
          <span class="status-text">Connecting...</span>
        </div>
        <button class="btn-settings" onclick="toggleSettings()">⚙️</button>
      </div>
    </header>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel" style="display: none;">
      <div class="settings-content">
        <h3>Connection Settings</h3>
        <div class="settings-row">
          <label>Session ID:</label>
          <input type="text" id="sessionId" value="default" placeholder="Enter session ID">
        </div>
        <div class="settings-row">
          <label>WebSocket URL:</label>
          <input type="text" id="wsUrl" value="ws://localhost:3000" placeholder="ws://localhost:3000">
        </div>
        <div class="settings-actions">
          <button class="btn btn-primary" onclick="reconnect()">Reconnect</button>
          <button class="btn btn-secondary" onclick="toggleSettings()">Close</button>
        </div>
      </div>
    </div>

    <!-- Chat Container -->
    <main class="chat-container" id="chatContainer">
      <div class="welcome-message">
        <div class="welcome-icon">👋</div>
        <h2>Welcome to Gemma Chat</h2>
        <p>Type a message below to start chatting with the AI through Redis streams.</p>
        <p class="hint">Messages are sent to <code>uncver:stream:input</code> and responses come from <code>uncver:stream:response</code>.</p>
      </div>
    </main>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator" style="display: none;">
      <span class="typing-text">Gemma is thinking</span>
      <span class="typing-dots">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </div>

    <!-- Input Area -->
    <footer class="input-area">
      <div class="input-container">
        <textarea 
          id="messageInput" 
          placeholder="Type your message..." 
          rows="1"
          maxlength="2000"
        ></textarea>
        <div class="input-actions">
          <span class="char-count" id="charCount">0/2000</span>
          <button class="btn-send" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
      </div>
    </footer>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
