name: Release uncver-gemma3-1b-listener

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release-gemma3-1b-v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release-gemma3-1b-v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Could not extract valid version from branch: ${BRANCH}"
            exit 1
          fi
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: v${VERSION}"

      - name: Build uncver-gemma3-1b-listener
        run: |
          echo "Building uncver-gemma3-1b-listener..."
          ./scripts/build.sh gemma3.1b

      - name: Package uncver-gemma3-1b-listener
        run: |
          echo "Packaging uncver-gemma3-1b-listener..."
          ./scripts/package.sh gemma3.1b

      - name: Create release package
        run: |
          mkdir -p release
          tar -czf "release/uncver-gemma3-1b-listener-${{ steps.extract.outputs.version }}.tar.gz" -C "dist/gemma3.1b" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.extract.outputs.version }}
          name: Release uncver-gemma3-1b-listener ${{ steps.extract.outputs.version }}
          files: release/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
