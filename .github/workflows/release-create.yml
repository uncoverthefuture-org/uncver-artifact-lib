name: Release uncver-create

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release-create-v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev libhiredis-dev cmake make g++

      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release-create-}"
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Could not extract valid version from branch: ${BRANCH}"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Build uncver-create
        run: |
          echo "Building uncver-create..."
          ./scripts/build.sh create

      - name: Package uncver-create
        run: |
          echo "Packaging uncver-create..."
          ./scripts/package.sh create

      - name: Create release package
        run: |
          mkdir -p release
          tar -czf "release/uncver-create-${{ steps.extract.outputs.version }}.tar.gz" -C "dist/create" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.extract.outputs.version }}
          name: Release uncver-create ${{ steps.extract.outputs.version }}
          files: release/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
