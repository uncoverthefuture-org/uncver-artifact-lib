name: Orchestrate Artifact Builds

on:
  push:
    branches: [main, master]
    paths:
      - 'create/**'
      - 'delete/**'
      - 'discover/**'
      - 'start/**'
      - 'stop/**'
      - 'share/**'
      - 'artifacts/**'
      - 'websocket-stream/**'
      - 'redis-stream/**'
      - 'traefik/**'
      - 'ngrok/**'
      - 'knowledge-graph/**'
      - 'mecury-inception-listener/**'
      - 'redis-stream-gui/**'
      - 'scripts/**'
      - '.github/workflows/orchestrate.yml'
  pull_request:
    types: [closed]
    branches: [main, master]
    paths:
      - 'create/**'
      - 'delete/**'
      - 'discover/**'
      - 'start/**'
      - 'stop/**'
      - 'share/**'
      - 'artifacts/**'
      - 'websocket-stream/**'
      - 'redis-stream/**'
      - 'traefik/**'
      - 'ngrok/**'
      - 'knowledge-graph/**'
      - 'mecury-inception-listener/**'
      - 'redis-stream-gui/**'
      - 'scripts/**'
      - '.github/workflows/orchestrate.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      should_skip: ${{ steps.changes.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Detect changed artifacts
        id: changes
        run: |
          ALL_ARTIFACTS='["create","delete","discover","ngrok","redis-stream","share","start","stop","traefik","websocket-stream","artifacts","knowledge-graph","mecury-inception-listener","redis-stream-gui"]'
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            CHANGED="$ALL_ARTIFACTS"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ] && [ "${{ github.event.pull_request.merged }}" == "true" ] && [[ "${{ github.event.pull_request.head.ref }}" == release-please--* ]]; then
            CHANGED="$ALL_ARTIFACTS"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          else
            CHANGED_DIRS=$(git diff --name-only HEAD~1 HEAD | grep -E '^[a-z-]+/' | cut -d'/' -f1 | sort -u | jq -R . | jq -s . | tr -d '\n')
            if [ -z "$CHANGED_DIRS" ] || [ "$CHANGED_DIRS" == "[]" ]; then
              echo "should_skip=true" >> $GITHUB_OUTPUT
              echo "No artifact changes detected, skipping build"
            else
              CHANGED="$CHANGED_DIRS"
              echo "should_skip=false" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "matrix={\"artifact\":$CHANGED}" >> $GITHUB_OUTPUT
          echo "Changed artifacts: $CHANGED"

  build-artifacts:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.should_skip != 'true'
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Build ${{ matrix.artifact }}
        run: |
          echo "Building ${{ matrix.artifact }}..."
          ./scripts/build.sh ${{ matrix.artifact }}
      
      - name: Test ${{ matrix.artifact }}
        run: |
          echo "Testing ${{ matrix.artifact }}..."
          ./scripts/test.sh ${{ matrix.artifact }}
      
      - name: Package ${{ matrix.artifact }}
        run: |
          echo "Packaging ${{ matrix.artifact }}..."
          ./scripts/package.sh ${{ matrix.artifact }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-build
          path: dist/${{ matrix.artifact }}/

  notify-local-pc:
    needs: build-artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release-please--')
    steps:
      - name: Notify local PC via WebSocket
        env:
          WEBSOCKET_URL: ${{ secrets.LOCAL_WEBSOCKET_URL }}
        run: |
          if [ -n "$WEBSOCKET_URL" ]; then
            echo "Notifying local PC at $WEBSOCKET_URL..."
            
            STATUS="success"
            if [ "${{ needs.build-artifacts.result }}" != "success" ]; then
              STATUS="failed"
            fi
            
            curl -k -X POST "$WEBSOCKET_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"github_build_complete\",
                \"repository\": \"${{ github.repository }}\",
                \"commit\": \"${{ github.sha }}\",
                \"status\": \"$STATUS\",
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }" || echo "WebSocket notification failed (PC may be offline)"
          else
            echo "No WEBSOCKET_URL configured, skipping notification"
          fi

  fire-all-artifacts:
    needs: build-artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release-please--')
    steps:
      - name: Fire/trigger all artifacts
        run: |
          echo "All artifacts built successfully!"
          echo "Firing up the artifact ecosystem..."
          
          curl -k -X POST "${{ secrets.LOCAL_WEBSOCKET_URL }}/fire" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "fire_artifacts",
              "message": "All artifacts built and ready to deploy",
              "artifacts": ["create","delete","discover","ngrok","redis-stream","share","start","stop","traefik","websocket-stream","artifacts","knowledge-graph","mecury-inception-listener","redis-stream-gui"]
            }' || echo "Fire command failed (PC may be offline)"
