<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redis Stream Monitor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔴 Redis Stream Monitor</h1>
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot disconnected"></span>
        <span>Disconnected</span>
      </div>
    </header>

    <div class="main-content">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="connection-panel">
          <h3>Connection</h3>
          <input type="text" id="redisUrl" placeholder="redis://localhost:6379" value="redis://localhost:6379">
          <button onclick="connectRedis()">Connect</button>
        </div>

        <div class="streams-panel">
          <h3>Streams</h3>
          <button onclick="refreshStreams()" class="refresh-btn">🔄 Refresh</button>
          <ul id="streamList" class="stream-list">
            <!-- Streams will be listed here -->
          </ul>
        </div>
      </aside>

      <!-- Main Panel -->
      <main class="content">
        <div class="toolbar">
          <h2 id="currentStream">Select a stream</h2>
          <div class="actions">
            <button onclick="startMonitoring()" id="monitorBtn" disabled>▶️ Start Monitor</button>
            <button onclick="loadMessages()" id="loadBtn" disabled>📥 Load Messages</button>
            <button onclick="clearMessages()">🗑️ Clear</button>
          </div>
        </div>

        <div class="messages-container" id="messagesContainer">
          <div class="placeholder">
            <p>Connect to Redis and select a stream to view messages</p>
          </div>
        </div>

        <!-- Publish Message Panel -->
        <div class="publish-panel">
          <h3>Publish Message</h3>
          <div class="publish-form">
            <input type="text" id="publishKey" placeholder="Key">
            <input type="text" id="publishValue" placeholder="Value">
            <button onclick="publishMessage()">📤 Publish</button>
          </div>
        </div>
      </main>
    </div>

    <footer>
      <p>uncver Redis Stream Monitor v1.0.0</p>
    </footer>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
