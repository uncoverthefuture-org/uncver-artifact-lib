version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: uncver-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uncver-network

  create-artifact:
    build: ../uncver-create-artifact
    container_name: uncver-create-artifact
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - uncver-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  uncver-network:
    driver: bridge
    name: uncver-network
